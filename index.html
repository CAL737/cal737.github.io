<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>wyj484 的博客</title>
  <meta name="description" content="学习笔记、技术探索、日常激励与游戏文化的温柔与实用合集" />
  <style>
    :root{
      --bg:#0f1223;
      --bg-soft:#141738;
      --panel:#1b1f4a;
      --card:#21255a;
      --text:#e6e9ff;
      --muted:#aeb5ff;
      --accent:#7aa2ff;
      --accent-2:#a57bff;
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:14px;
      --radius-sm:10px;
      --gap:18px;
      --transition:.25s ease;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:ui-sans-serif, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, "Noto Sans", "Hiragino Sans GB", sans-serif;
      color:var(--text);
      background:linear-gradient(180deg, #0d1020 0%, #121535 100%);
      overflow-x:hidden;
      animation:fadeIn .6s ease both;
    }
    @keyframes fadeIn{
      from{opacity:0; transform:translateY(8px)}
      to{opacity:1; transform:translateY(0)}
    }

    a{color:var(--accent); text-decoration:none}
    a:hover{color:#9bbcff}

    .layout{
      display:grid;
      grid-template-columns: 300px 1fr;
      gap:var(--gap);
      padding:var(--gap);
      max-width:1200px;
      margin:0 auto;
    }

    .sidebar{
      background:linear-gradient(180deg, var(--panel), var(--card));
      border:1px solid #2b3070;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      position:sticky;
      top:var(--gap);
      height:calc(100vh - var(--gap)*2);
      overflow:auto;
      padding:20px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      padding-bottom:16px;
      border-bottom:1px dashed #2f357c;
      margin-bottom:16px;
    }
    .brand .logo{
      width:40px; height:40px; border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #7aa2ff, #a57bff 60%, #4f5bd9);
      box-shadow:0 6px 18px rgba(122,162,255,.45);
      flex-shrink:0;
    }
    .brand .meta .title{font-weight:700; letter-spacing:.3px}
    .brand .meta .desc{font-size:12px; color:var(--muted)}

    .section-title{
      font-size:13px; color:var(--muted); letter-spacing:.4px;
      text-transform:uppercase;
      margin:18px 0 10px;
    }

    .nav, .cats, .about{
      display:flex; flex-direction:column; gap:10px;
    }
    .nav a, .cats button{
      background:linear-gradient(180deg, #262b6a, #262b6a);
      border:1px solid #343a86;
      color:var(--text);
      padding:10px 12px;
      border-radius:var(--radius-sm);
      display:flex; align-items:center; gap:8px;
      transition:transform var(--transition), box-shadow var(--transition), background var(--transition);
    }
    .nav a:hover, .cats button:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 24px rgba(122,162,255,.2);
      background:linear-gradient(180deg, #2b3178, #2b3178);
    }

    .search{
      position:relative; margin-top:8px;
    }
    .search input{
      width:100%;
      background:linear-gradient(180deg, #1c2056, #1c2056);
      border:1px solid #31367f;
      color:var(--text);
      padding:12px 12px 12px 38px;
      border-radius:var(--radius-sm);
      outline:none;
    }

    .cats{
      gap:8px;
    }
    .cats button{
      cursor:pointer;
      display:flex; justify-content:space-between;
    }
    .cats .badge{
      font-size:12px; color:#cdd2ff;
      background:#2f357c; padding:2px 8px; border-radius:999px;
      border:1px solid #4047a2;
    }

    .about{
      background:linear-gradient(180deg,#1b1f4a,#1c2258);
      padding:12px; border-radius:var(--radius-sm);
      border:1px solid #2b3070; color:#d8dcff;
    }

    .main{min-height:100vh;}
    .hero{
      background:linear-gradient(180deg, #1b1f4a, #21255a);
      border:1px solid #2b3070;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:22px;
      display:flex; align-items:center; justify-content:space-between; gap:16px;
      margin-bottom:var(--gap);
    }
    .hero .info h1{margin:0 0 8px; font-size:24px}
    .hero .info p{margin:0; color:#cfd4ff}
    .hero .actions{display:flex; gap:10px; flex-wrap:wrap;}
    .btn{
      background:linear-gradient(180deg, #2b3178, #2b3178);
      color:var(--text);
      border:1px solid #3a41a0;
      padding:10px 12px; border-radius:12px;
      transition:transform var(--transition), box-shadow var(--transition), background var(--transition);
      display:inline-flex; align-items:center; gap:8px;
    }
    .btn:hover{
      transform:translateY(-2px);
      box-shadow:0 8px 24px rgba(165,123,255,.25);
      background:linear-gradient(180deg, #32398d, #32398d);
    }

    .grid{display:grid; grid-template-columns: repeat(2, 1fr); gap:var(--gap);}
    .card{
      background:linear-gradient(180deg, #22265b, #1f2355);
      border:1px solid #33397f;
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
      transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      position:relative;
      overflow:hidden;
    }
    .card:hover{
      transform:translateY(-4px) scale(1.01);
      box-shadow:0 16px 40px rgba(122,162,255,.25);
      border-color:#4650b2;
    }
    .card .meta{display:flex; align-items:center; gap:10px; color:#cfd4ff; font-size:13px; margin-bottom:10px;}
    .tag{font-size:12px; color:#dfe3ff; background:#2f357c; border:1px solid #4047a2; padding:4px 8px; border-radius:999px;}
    .date{color:#b7bdff; font-size:12px;}
    .card h3{margin:6px 0 8px}
    .card p{margin:0 0 10px; color:#d9ddff}
    .card .more{font-size:14px; color:#9bbcff}
    .card .more:hover{color:#c6d6ff}

    .footer{
      margin-top:var(--gap);
      padding:16px;
      color:#bfc5ff;
      display:flex; justify-content:space-between; gap:10px;
      border-top:1px dashed #2e3480;
    }
    .footer .left{font-size:13px}
    .footer .right{display:flex; gap:8px; flex-wrap:wrap}

      border:1px solid #3a41a0; color:#cfd4ff;
      background:linear-gradient(180deg,#262b6a,#
