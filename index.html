<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>何意味</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #111111;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f0f10; --fg: #e9e9ea; }
    }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 6vh 4vw;
      text-align: center;
    }
    /* “大大”作为字体大小修饰：让文字超大且自适应 */
    .word {
      margin: 0;
      font-weight: 700;
      letter-spacing: 0.08em;
      line-height: 1.05;
      /* 自适应超大字号：移动端到超宽屏都保持巨大而不溢出 */
      font-size: clamp(48px, 12vw, 160px);
    }
    .hint {
      margin-top: 1rem;
      font-size: 0.95rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="word">何意味</h1>
    <p class="hint">“大大”是字体大小的修饰词，这里用超大字号展示。</p>
  </main>
</body>
</html>
