<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的 GitHub Pages</title>
  <style>
    body {
      font-family: "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    main {
      padding: 40px;
      text-align: center;
    }
    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    a {
      color: #4CAF50;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>欢迎来到我的 GitHub Pages</h1>
  </header>
  <main>
    <p>这是我的第一个网页，用 GitHub Pages 搭建。</p>
    <p>你可以在这里展示项目、写博客，或者放置个人介绍。</p>
    <p>👉 <a href="https://github.com/你的用户名">访问我的 GitHub</a></p>
  </main>
  <footer>
    <p>© 2025 我的名字 · 使用 GitHub Pages 构建</p>
  </footer>
</body>
</html>
